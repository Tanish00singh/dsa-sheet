.search { margin: 16px 20px 8px; }

.topics { padding: 8px 20px 24px; }

.topic-card:hover { border-color: #e9456040; }

.topic-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }

.topic-prog { font-size: 12px; color: var(--muted); margin-right: 8px; }
.topic-prog .done { color: var(--green); font-weight: 700; }

.open .chevron { transform: rotate(180deg); }
.prog-bar-wrap { height: 3px; background: #ffffff10; border-radius: 2px; width: 60px; margin-right: 8px; }
.prog-bar { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
.problems { display: none; padding: 0 16px 16px; border-top: 1px solid #ffffff10; }
.open .problems { display: block; }
.prob { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #ffffff08; }
.prob:last-child { border-bottom: none; }
.prob-check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid #ffffff30; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.prob-check.checked { background: var(--green); border-color: var(--green); }
.prob-check.checked::after { content: '✓'; font-size: 11px; color: #fff; font-weight: 700; }
.prob-info { flex: 1; min-width: 0; }
.prob-name { font-size: 13px; color: #dde; font-weight: 500; line-height: 1.3; }
.prob-meta { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
.diff { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 600; letter-spacing: 0.5px; }
.diff.med { background: #f5a62325; color: var(--gold); border: 1px solid #f5a62340; }
.plat { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }

.plat.cf { background: #1c6be125; color: #5c9cf5; border: 1px solid #1c6be140; }

const solved = JSON.parse(localStorage.getItem('dsa_solved') || '{}');

function save() { try { localStorage.setItem('dsa_solved', JSON.stringify(solved)); } catch(e) {} }

function updateStats() {
  let total = 0, done = 0, topicsDone = 0;
  DATA.forEach((t, ti) => {
    let td = 0;
    t.problems.forEach((_, pi) => {
      total++;
      if (solved[ti + '-' + pi]) { done++; td++; }
    });
    if (td === t.problems.length) topicsDone++;
  });
  document.getElementById('s-solved').textContent = done;
  document.getElementById('s-pct').textContent = Math.round(done / total * 100) + '%';
  document.getElementById('s-topics').textContent = topicsDone + '/25';
}

function platLabel(p) {
  if (p === 'lc') return '<span class="plat lc">LeetCode</span>';
  if (p === 'cf') return '<span class="plat cf">Codeforces</span>';
  return '<span class="plat cc">CodeChef</span>';
}

function render(filter) {
  const c = document.getElementById('topicsContainer');
  c.innerHTML = '';
  DATA.forEach((topic, ti) => {
    const probs = filter ? topic.problems.filter(p => p.n.toLowerCase().includes(filter) || topic.t.toLowerCase().includes(filter)) : topic.problems;
    if (filter && probs.length === 0) return;
    const doneCount = topic.problems.filter((_, pi) => solved[ti + '-' + pi]).length;
    const pct = Math.round(doneCount / topic.problems.length * 100);
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.innerHTML = `
      <div class="topic-header" onclick="toggle(this.parentElement)">
        <div class="topic-num">${ti + 1}</div>
        <div class="topic-title">${topic.t}</div>
        <div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
        <div class="topic-prog"><span class="done">${doneCount}</span>/${topic.problems.length}</div>
        <div class="chevron">▼</div>
      </div>
      <div class="problems">
        ${(filter ? probs : topic.problems).map((p, pi) => {
          const realPi = filter ? topic.problems.indexOf(p) : pi;
          const key = ti + '-' + realPi;
          const isChecked = solved[key] ? 'checked' : '';
          return `<div class="prob" id="prob-${ti}-${realPi}">
            <div class="prob-check ${isChecked}" onclick="toggleSolve(${ti},${realPi},this)"></div>
            <div class="prob-info">
              <div class="prob-name">${p.n}</div>
              <div class="prob-meta">
                <span class="diff med">Medium</span>
                ${platLabel(p.p)}
                <span class="free-badge">FREE</span>
              </div>
            </div>
            <a class="prob-link" href="${p.url}" target="_blank">Solve →</a>
          </div>`;
        }).join('')}
      </div>`;
    c.appendChild(card);
    if (filter) card.classList.add('open');
  });
}

function toggle(card) { card.classList.toggle('open'); }

function toggleSolve(ti, pi, el) {
  const key = ti + '-' + pi;
  if (solved[key]) { delete solved[key]; el.classList.remove('checked'); }
  else { solved[key] = 1; el.classList.add('checked'); }
  save();
  updateStats();
  const card = el.closest('.topic-card');
  const idx = DATA.findIndex((_, i) => card.querySelector('.topic-num').textContent == i + 1);
  const realTi = parseInt(el.closest('.topic-card').querySelector('.topic-num').textContent) - 1;
  const doneCount = DATA[realTi].problems.filter((_, pi2) => solved[realTi + '-' + pi2]).length;
  const pct = Math.round(doneCount / DATA[realTi].problems.length * 100);
  card.querySelector('.prog-bar').style.width = pct + '%';
  card.querySelector('.done').textContent = doneCount;
}

function doSearch(v) { render(v.toLowerCase().trim()); }

render();
updateStats();
</script>
